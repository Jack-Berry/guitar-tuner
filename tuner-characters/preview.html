<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tuner Character Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
      font-family: monospace;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      align-items: flex-end;
    }
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .card img { width: 60px; height: 96px; }
    .card span { color: #444; font-size: 10px; }
  </style>
</head>
<body>
  <div class="row">
    <div class="card">
      <img src="tuner_-50.svg" alt="-50">
      <span>-50</span>
    </div>
    <div class="card">

    </div>

    <div class="card">
